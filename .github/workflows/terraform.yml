name: Terraform

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".do/app.yaml.tmpl"
      - "scripts/render_app_spec.py"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply Terraform data services. Requires backend.tf and DIGITALOCEAN_TOKEN."
        required: true
        type: boolean
        default: false
      deploy_app:
        description: "Render and upsert the App Platform App Spec after data services exist."
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  plan:
    name: Plan/apply infrastructure and App Spec
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: validate
    env:
      DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set up doctl
        if: inputs.deploy_app == true
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Require remote backend for apply or App Spec deploy
        if: inputs.apply == true || inputs.deploy_app == true
        working-directory: infra/terraform
        run: |
          if [ ! -f backend.tf ]; then
            echo "backend.tf is required before applying or deploying from CI."
            exit 1
          fi

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform plan
        working-directory: infra/terraform
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        if: inputs.apply == true
        working-directory: infra/terraform
        run: terraform apply -input=false -auto-approve tfplan

      - name: Render App Spec from Terraform outputs
        if: inputs.deploy_app == true
        run: |
          set -euo pipefail

          postgres_cluster_id="$(terraform -chdir=infra/terraform output -raw postgres_cluster_id)"
          kafka_cluster_id="$(terraform -chdir=infra/terraform output -raw kafka_cluster_id)"

          export APP_NAME="$(terraform -chdir=infra/terraform output -raw app_name)"
          export APP_REGION="$(terraform -chdir=infra/terraform output -raw app_region)"
          export GITHUB_REPO="$(terraform -chdir=infra/terraform output -raw github_repo)"
          export GITHUB_BRANCH="$(terraform -chdir=infra/terraform output -raw github_branch)"
          export DATABASE_URL="$(terraform -chdir=infra/terraform output -raw database_url)"
          export KAFKA_BOOTSTRAP_SERVERS="$(terraform -chdir=infra/terraform output -raw kafka_bootstrap_servers)"
          export KAFKA_SASL_MECHANISM="$(terraform -chdir=infra/terraform output -raw kafka_sasl_mechanism)"
          export KAFKA_USERNAME="$(terraform -chdir=infra/terraform output -raw kafka_username)"
          export KAFKA_PASSWORD="$(terraform -chdir=infra/terraform output -raw kafka_password)"
          export KAFKA_TOPIC="$(terraform -chdir=infra/terraform output -raw kafka_topic)"
          export KAFKA_DLQ_TOPIC="$(terraform -chdir=infra/terraform output -raw kafka_dlq_topic)"
          export KAFKA_CONSUMER_GROUP="$(terraform -chdir=infra/terraform output -raw kafka_consumer_group)"
          export API_INSTANCE_COUNT="$(terraform -chdir=infra/terraform output -raw api_instance_count)"
          export WORKER_INSTANCE_COUNT="$(terraform -chdir=infra/terraform output -raw worker_instance_count)"
          export APP_INSTANCE_SIZE_SLUG="$(terraform -chdir=infra/terraform output -raw app_instance_size_slug)"
          export WORKER_INSTANCE_SIZE_SLUG="$(terraform -chdir=infra/terraform output -raw worker_instance_size_slug)"
          export MAX_INGEST_BATCH_SIZE="$(terraform -chdir=infra/terraform output -raw max_ingest_batch_size)"
          export MAX_PAGE_SIZE="$(terraform -chdir=infra/terraform output -raw max_page_size)"
          export KAFKA_SSL_CA_PEM="$(doctl databases get-ca "$kafka_cluster_id" -o json | jq -r .certificate | base64 --decode)"

          echo "::add-mask::$DATABASE_URL"
          echo "::add-mask::$KAFKA_USERNAME"
          echo "::add-mask::$KAFKA_PASSWORD"
          while IFS= read -r ca_line; do
            if [ -n "$ca_line" ]; then
              echo "::add-mask::$ca_line"
            fi
          done <<< "$KAFKA_SSL_CA_PEM"

          python scripts/render_app_spec.py .do/app.yaml.tmpl .do/app.generated.yaml

          {
            echo "POSTGRES_CLUSTER_ID=$postgres_cluster_id"
            echo "KAFKA_CLUSTER_ID=$kafka_cluster_id"
          } >> "$GITHUB_ENV"

      - name: Validate App Spec schema
        if: inputs.deploy_app == true
        run: doctl apps spec validate .do/app.generated.yaml --schema-only > /dev/null

      - name: Upsert App Platform app
        if: inputs.deploy_app == true
        run: |
          set -euo pipefail
          app_id="$(doctl apps create --spec .do/app.generated.yaml --upsert --update-sources --format ID --no-header | awk 'NR == 1 {print $1}')"
          if [ -z "$app_id" ]; then
            echo "App upsert did not return an app ID."
            exit 1
          fi
          echo "APP_ID=$app_id" >> "$GITHUB_ENV"

      - name: Restrict database trusted sources to App Platform app
        if: inputs.deploy_app == true
        run: |
          set -euo pipefail
          doctl databases firewalls replace "$POSTGRES_CLUSTER_ID" --rule "app:$APP_ID"
          doctl databases firewalls replace "$KAFKA_CLUSTER_ID" --rule "app:$APP_ID"

      - name: Redeploy app after trusted sources are active
        if: inputs.deploy_app == true
        run: doctl apps create-deployment "$APP_ID" --update-sources --wait
