name: Terraform

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      enable_app:
        description: "Create/update App Platform API and worker. Use false for phase 1, true after Kafka CA is available."
        required: true
        type: boolean
        default: false
      apply:
        description: "Apply the Terraform plan. Requires backend.tf and repository secrets."
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  plan:
    name: Plan or apply Terraform
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: infra/terraform
    env:
      DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
      TF_VAR_enable_app: ${{ inputs.enable_app }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set up doctl
        if: inputs.enable_app == true
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Require remote backend for apply
        if: inputs.apply == true
        run: |
          if [ ! -f backend.tf ]; then
            echo "backend.tf is required before applying from CI."
            exit 1
          fi

      - name: Terraform init
        run: terraform init

      - name: Fetch Kafka CA certificate
        if: inputs.enable_app == true
        run: |
          kafka_cluster_id="$(terraform output -raw kafka_cluster_id)"
          kafka_ca_pem="$(doctl databases get-ca "$kafka_cluster_id" -o json | jq -r .certificate | base64 --decode)"
          {
            echo "TF_VAR_kafka_ssl_ca_pem<<EOF"
            echo "$kafka_ca_pem"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        if: inputs.apply == true
        run: terraform apply -input=false -auto-approve tfplan
